  #     - name: build
  #       run: |
  #         cmake --build build --config Release
  #     - name: install
  #       run: |
  #         cmake --install build
  #     - name: package
  #       run: |
  #         cd _install
  #         tar -czf piper_macos_${{ matrix.arch }}.tar.gz piper/
  #     - name: upload artifacts
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: piper-macos-${{ matrix.arch }}
  #         path: _install/piper_macos_${{ matrix.arch }}.tar.gz
  #         if-no-files-found: error

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs:
      - build_windows
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Normalize asset names
        run: |
          mkdir -p release-upload
          cp release-assets/piper-windows-amd64/piper_windows_amd64.zip release-upload/piper_windows_amd64.zip
      - name: Prepare release metadata
        id: release_meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            release_tag="${GITHUB_REF_NAME}"
            release_title="${GITHUB_REF_NAME}"
            release_flags="--latest"
            release_notes="Release ${GITHUB_REF_NAME}"
          else
            release_tag="master-${GITHUB_RUN_NUMBER}-${short_sha}"
            release_title="Build master #${GITHUB_RUN_NUMBER} (${short_sha})"
            release_flags="--prerelease --latest=false"
            release_notes="Build automático desde master.\n\nCommit: ${GITHUB_SHA}\nRun: ${GITHUB_RUN_NUMBER}\nPlataforma: Windows amd64"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_title=${release_title}"
            echo "release_flags=${release_flags}"
            echo "release_notes<<EOF"
            echo -e "${release_notes}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          ${{ steps.release_meta.outputs.release_notes }}
          EOF
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.release_meta.outputs.release_tag }}" release-upload/* \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.release_meta.outputs.release_title }}" \
            --notes-file release-notes.md \
            ${{ steps.release_meta.outputs.release_flags }}
