name: release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag/release exacto para subir assets. Déjalo vacío para usar release vacío existente o crear el siguiente 1.1, 1.2, 2.1..."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build_windows:
    runs-on: windows-latest
    name: "windows build: ${{ matrix.arch }}"
    strategy:
      fail-fast: true
      matrix:
        arch: [x64]
    steps:
      - uses: actions/checkout@v4
      - name: install zstd
        run: |
          vcpkg install zstd:${{ matrix.arch }}-windows
      - name: configure
        run: |
          cmake -Bbuild -DCMAKE_INSTALL_PREFIX=_install/piper -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
      - name: build
        run: |
          cmake --build build --config Release
      - name: install
        run: |
          cmake --install build
      - name: copy vcpkg runtime dlls
        shell: pwsh
        run: |
          $triplet = "${{ matrix.arch }}-windows"
          $binDir = Join-Path $env:VCPKG_INSTALLATION_ROOT "installed/$triplet/bin"
          if (Test-Path $binDir) {
            Copy-Item "$binDir/*.dll" "_install/piper/" -ErrorAction SilentlyContinue
          }
      - name: smoke test packaged executable
        shell: pwsh
        run: |
          .\_install\piper\piper.exe --help
      - name: package
        run: |
          cd _install
          Compress-Archive -LiteralPath piper -DestinationPath piper_windows_amd64.zip
      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: piper-windows-amd64
          path: _install/piper_windows_amd64.zip
          if-no-files-found: error

  release:
    name: Create or update release
    runs-on: ubuntu-latest
    needs:
      - build_windows
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Normalize asset names
        run: |
          mkdir -p release-upload
          cp release-assets/piper-windows-amd64/piper_windows_amd64.zip release-upload/piper_windows_amd64.zip
      - name: Resolve release version
        id: release_meta
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail

          asset_name="piper_windows_amd64.zip"
          requested="${INPUT_RELEASE_TAG:-}"

          normalize_numeric_tag() {
            local tag="$1"
            tag="${tag#v}"
            [[ "$tag" =~ ^[0-9]+\.[0-9]+$ ]] || return 1
            echo "$tag"
          }

          release_exists() {
            gh release view "$1" --json tagName >/dev/null 2>&1
          }

          release_has_asset() {
            local tag="$1"
            gh release view "$tag" --json assets --jq '.assets[]?.name' 2>/dev/null | grep -Fxq "$asset_name"
          }

          if [[ -n "$requested" ]]; then
            release_tag="$requested"
          else
            mapfile -t numeric_tags < <(
              gh release list --limit 100 --json tagName,isDraft,isPrerelease \
                --jq '.[] | select(.isDraft == false and .isPrerelease == false) | .tagName' \
              | while read -r tag; do normalize_numeric_tag "$tag" || true; done \
              | sort -t. -k1,1n -k2,2n
            )

            if [[ ${#numeric_tags[@]} -eq 0 ]]; then
              release_tag="1.1"
            else
              latest="${numeric_tags[-1]}"
              if release_exists "$latest" && ! release_has_asset "$latest"; then
                # Caso esperado: creas manualmente 2.0 vacío y ejecutas el workflow.
                # El compilado se sube a 2.0; el siguiente run creará 2.1.
                release_tag="$latest"
              else
                major="${latest%%.*}"
                minor="${latest##*.}"
                release_tag="${major}.$((minor + 1))"
              fi
            fi
          fi

          release_title="Piper Neo ${release_tag}"
          release_notes="Build manual de Piper Neo.\n\nCommit: ${GITHUB_SHA}\nRun: ${GITHUB_RUN_NUMBER}\nPlataforma: Windows amd64"

          {
            echo "release_tag=${release_tag}"
            echo "release_title=${release_title}"
            echo "release_notes<<EOF"
            echo -e "${release_notes}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
      - name: Write release notes
        shell: bash
        env:
          RELEASE_NOTES: ${{ steps.release_meta.outputs.release_notes }}
        run: |
          printf '%s\n' "$RELEASE_NOTES" > release-notes.md
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release_meta.outputs.release_tag }}"
          title="${{ steps.release_meta.outputs.release_title }}"

          if gh release view "$tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "$title" \
              --notes-file release-notes.md \
              --latest
            gh release upload "$tag" release-upload/* \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "$tag" release-upload/* \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "$title" \
              --notes-file release-notes.md \
              --latest
          fi
